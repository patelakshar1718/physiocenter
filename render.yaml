services:
  - type: web
    name: physiocenter-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm run render-start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: ./data/physiocenter.sqlite
      - key: ENABLE_SCAN_SIMULATION
        value: "true"
      - key: SEED_ADMIN_NAME
        value: Admin
      - key: SEED_ADMIN_EMAIL
        value: admin@physiocenter.local
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        sync: false
